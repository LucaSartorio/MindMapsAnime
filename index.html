<!doctype html>
<html lang="it" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070709" />
    <meta name="format-detection" content="telephone=no" />

    <!-- SEO predefinito (il pre-rendering e react-helmet sovrascrivono per rotta) -->
    <title>Mappe Interattive — Atlante interattivo di anime e manga</title>
    <meta
      name="description"
      content="Esplora i mondi dei tuoi anime e manga preferiti attraverso mappe interattive, timeline, personaggi, fazioni, archi narrativi e percorsi. Naruto, Hunter x Hunter, One Piece e altri."
    />
    <meta name="author" content="Luca Sartorio" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <link rel="canonical" href="https://mindmapsanime.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mappe Interattive" />
    <meta
      property="og:title"
      content="Mappe Interattive — Atlante interattivo di anime e manga"
    />
    <meta
      property="og:description"
      content="Esplora i mondi dei tuoi anime e manga preferiti: mappe interattive, timeline, personaggi, fazioni, archi narrativi e percorsi."
    />
    <meta property="og:url" content="https://mindmapsanime.vercel.app/" />
    <meta
      property="og:image"
      content="https://mindmapsanime.vercel.app/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="it_IT" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Mappe Interattive — Atlante interattivo di anime e manga"
    />
    <meta
      name="twitter:description"
      content="Esplora i mondi dei tuoi anime e manga preferiti: mappe, timeline, personaggi, fazioni, archi e percorsi."
    />
    <meta
      name="twitter:image"
      content="https://mindmapsanime.vercel.app/og-image.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-ink-950 text-ink-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
