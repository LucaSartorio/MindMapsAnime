  Quando si sostituisce, eventualmente rifinire `src/data/naruto/boundaries.ts`.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 882.2204" preserveAspectRatio="xMidYMid meet">
