<?xml version="1.0" encoding="UTF-8"?>
<!--
  Naruto World Map · placeholder ad alta densità (CC0).
  Disegnato localmente, NON è una mappa ufficiale.
  Sostituire l'intero file con `Naruto_World_Map.svg` autorizzato mantenendo
